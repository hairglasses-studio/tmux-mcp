# Inherit model, reasoning, and personal preferences from ~/.codex/config.toml.
# The global launcher layer now enforces root + full-access execution; this
# repo-local template remains project-scoped for compatibility surfaces.
approval_policy = "on-request"
sandbox_mode = "workspace-write"


# BEGIN GENERATED MCP SERVERS: codex-mcp-sync
# Generated by codexkit/scripts/codex-mcp-sync.sh from .mcp.json
[mcp_servers.tmux-mcp]
command = "bash"
args = ["-lc", "exec ./scripts/run-tmux-mcp.sh"]

# END GENERATED MCP SERVERS: codex-mcp-sync
[profiles.readonly_quiet]
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"

[profiles.workspace_auto]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"

[profiles.ci_json]
approval_policy = "never"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"

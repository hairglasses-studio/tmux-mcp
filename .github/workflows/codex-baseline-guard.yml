name: Codex Baseline Guard

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex-baseline-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Codex repo baseline
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1"
            exit 1
          }

          require_file() {
            local path="$1"
            [[ -f "$path" ]] || fail "Missing required file: $path"
          }

          require_match() {
            local pattern="$1"
            local path="$2"
            grep -qE "$pattern" "$path" || fail "Expected pattern '$pattern' in $path"
          }

          validate_skill_frontmatter() {
            local path="$1"
            local invalid
            invalid=$(
              awk '
                BEGIN { in_frontmatter = 0 }
                NR == 1 && $0 == "---" { in_frontmatter = 1; next }
                in_frontmatter && $0 == "---" { exit }
                !in_frontmatter { next }
                /^[[:space:]]*$/ { next }
                /^[[:space:]]*-[[:space:]]+/ { next }
                /^[A-Za-z0-9_-]+:/ {
                  key = $1
                  sub(/:.*/, "", key)
                  if (key != "name" && key != "description" && key != "allowed-tools") {
                    print key
                  }
                  next
                }
                { print "__INVALID__" }
              ' "$path" | sort -u
            )

            [[ -z "$invalid" ]] || fail "Non-portable skill frontmatter in $path: $invalid"
          }

          required_files=(
            "AGENTS.md"
            "CLAUDE.md"
            "GEMINI.md"
            ".claude/settings.json"
            ".gemini/settings.json"
            ".github/copilot-instructions.md"
            ".codex/config.toml"
            ".github/workflows/codex-review.yml"
            ".github/workflows/codex-security.yml"
            ".github/workflows/codex-structured-audit.yml"
            ".github/workflows/ai-dispatch.yml"
          )

          for path in "${required_files[@]}"; do
            require_file "$path"
          done

          require_match '^> Canonical instructions: AGENTS\.md' AGENTS.md
          require_match 'This repo uses \[AGENTS\.md\]\(AGENTS\.md\) as the canonical instruction file' CLAUDE.md
          require_match 'This repo uses \[AGENTS\.md\]\(AGENTS\.md\) as the canonical instruction file' GEMINI.md
          require_match 'See AGENTS\.md in the repository root' .github/copilot-instructions.md

          jq -e 'type == "object"' .claude/settings.json >/dev/null || \
            fail ".claude/settings.json must be valid JSON"
          jq -e 'type == "object"' .gemini/settings.json >/dev/null || \
            fail ".gemini/settings.json must be valid JSON"
          jq -e '(.context.fileName // []) | index("AGENTS.md") != null' .gemini/settings.json >/dev/null || \
            fail ".gemini/settings.json must include AGENTS.md in context.fileName"

          if git ls-files --error-unmatch CLAUDE.local.md >/dev/null 2>&1; then
            fail "CLAUDE.local.md must remain untracked"
          fi
          if git ls-files --error-unmatch AGENTS.override.md >/dev/null 2>&1; then
            fail "AGENTS.override.md must remain untracked unless a repo documents nested overrides"
          fi

          if [[ -f .mcp.json ]]; then
            active_mcp_servers="$(jq -r '(.mcpServers // {}) | if type != "object" then {} else . end | with_entries(select(.key | startswith("_") | not)) | length' .mcp.json)"
            if [[ "$active_mcp_servers" -gt 0 ]]; then
              jq -e '(.mcpServers // {}) | type == "object"' .claude/settings.json >/dev/null || \
                fail ".claude/settings.json must expose repo MCP servers"
              jq -e '(.mcpServers // {}) | type == "object"' .gemini/settings.json >/dev/null || \
                fail ".gemini/settings.json must expose repo MCP servers"
              jq -e '(.mcpServers // {}) | keys | all(test("^[a-z0-9]+(-[a-z0-9]+)*$"))' .gemini/settings.json >/dev/null || \
                fail ".gemini/settings.json MCP server names must use kebab-case"
            fi
          fi

          for profile in readonly_quiet review workspace_auto ci_json; do
            require_match "^\\[profiles\\.${profile}\\]" .codex/config.toml
          done

          if [[ -d .codex/agents ]] && find .codex/agents -type f -name '*-*.toml' | grep -q .; then
            fail "Subagent filenames must use underscore_case under .codex/agents/"
          fi

          if [[ -d .codex/agents ]] && find .codex/agents -maxdepth 1 -type f -name '*.toml' | grep -q .; then
            while IFS= read -r codex_agent; do
              base="$(basename "$codex_agent" .toml)"
              claude_agent=".claude/agents/${base}.md"
              gemini_command=".gemini/commands/${base}.toml"

              require_file "$claude_agent"
              require_file "$gemini_command"
              require_match 'GENERATED BY hg-provider-role-sync.sh' "$claude_agent"
              require_match 'GENERATED BY hg-provider-role-sync.sh' "$gemini_command"
            done < <(find .codex/agents -maxdepth 1 -type f -name '*.toml' | sort)
          fi

          if [[ -f .agents/skills/surface.yaml ]]; then
            jq -e '.version == 1 and (.skills | type == "array")' .agents/skills/surface.yaml >/dev/null || \
              fail "Invalid .agents/skills/surface.yaml"

            while IFS= read -r skill_name; do
              require_file ".agents/skills/${skill_name}/SKILL.md"
            done < <(jq -r '.skills[].name' .agents/skills/surface.yaml)

            while IFS= read -r skill_file; do
              validate_skill_frontmatter "$skill_file"
              if grep -q '\.claude/commands/' "$skill_file"; then
                fail "Canonical skill must not reference .claude/commands/: $skill_file"
              fi
            done < <(find .agents/skills -mindepth 2 -maxdepth 2 -name SKILL.md | sort)

            if [[ -d .claude/skills ]]; then
              while IFS= read -r skill_file; do
                grep -q 'GENERATED BY hg-skill-surface-sync.sh' "$skill_file" || \
                  fail "Hand-authored .claude/skills file found in managed repo: $skill_file"
              done < <(find .claude/skills -mindepth 2 -maxdepth 2 -name SKILL.md | sort)
            fi

            if [[ -d plugins ]]; then
              while IFS= read -r skill_file; do
                grep -q 'GENERATED BY hg-skill-surface-sync.sh' "$skill_file" || \
                  fail "Hand-authored plugin skill found in managed repo: $skill_file"
                if grep -q '\.claude/commands/' "$skill_file"; then
                  fail "Plugin skill must not reference .claude/commands/: $skill_file"
                fi
              done < <(find plugins -path '*/skills/*/SKILL.md' | sort)
            fi
          fi

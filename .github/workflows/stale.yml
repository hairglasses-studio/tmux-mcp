name: Stale

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 30 days if no further activity occurs.
            Remove the `stale` label or comment to keep it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 30 days if no further activity occurs.
            Remove the `stale` label or comment to keep it open.
          days-before-stale: 30
          days-before-close: 30
          exempt-issue-labels: 'priority/P0-critical,priority/P1-high'
          exempt-pr-labels: 'priority/P0-critical,priority/P1-high'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

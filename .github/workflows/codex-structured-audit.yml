name: Codex Structured Audit

on:
  workflow_dispatch:
    inputs:
      audit_scope:
        description: "What Codex should audit"
        required: true
        default: "Repository migration and operational risk audit"
        type: string

permissions:
  contents: read

jobs:
  codex-structured-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Codex structured audit
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          output-schema: |
            {
              "type": "object",
              "required": ["summary", "scope", "findings", "next_steps", "follow_up_questions"],
              "additionalProperties": false,
              "properties": {
                "summary": { "type": "string" },
                "scope": { "type": "string" },
                "findings": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "required": ["severity", "title", "file", "evidence", "recommendation"],
                    "additionalProperties": false,
                    "properties": {
                      "severity": {
                        "type": "string",
                        "enum": ["critical", "high", "medium", "low"]
                      },
                      "title": { "type": "string" },
                      "file": { "type": "string" },
                      "evidence": { "type": "string" },
                      "recommendation": { "type": "string" }
                    }
                  }
                },
                "next_steps": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "follow_up_questions": {
                  "type": "array",
                  "items": { "type": "string" }
                }
              }
            }
          prompt: |
            Audit scope:
            ${{ github.event.inputs.audit_scope }}

            Focus on concrete, source-backed findings only.

      - name: Save structured audit artifact
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > codex-structured-audit.json
          jq . codex-structured-audit.json >/dev/null
          jq '{
            summary,
            scope,
            findings_count: (.findings | length),
            critical_findings: ([.findings[] | select(.severity == "critical")] | length),
            high_findings: ([.findings[] | select(.severity == "high")] | length),
            next_steps,
            follow_up_questions
          }' codex-structured-audit.json > codex-structured-audit-summary.json

      - name: Upload structured audit
        uses: actions/upload-artifact@v4
        with:
          name: codex-structured-audit
          path: |
            codex-structured-audit.json
            codex-structured-audit-summary.json

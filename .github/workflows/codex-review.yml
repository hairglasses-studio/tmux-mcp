name: Codex Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@codex')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex'))
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number || github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/pull/${{ env.PR_NUMBER }}/merge

      - name: Pre-fetch PR refs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "issue_comment" ]; then
            git fetch --no-tags origin +refs/pull/${{ env.PR_NUMBER }}/head
          else
            git fetch --no-tags origin \
              ${{ github.event.pull_request.base.ref }} \
              +refs/pull/${{ env.PR_NUMBER }}/head
          fi

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          prompt: |
            Review the pull request changes for correctness, regressions, missing tests, and maintainability.
            Focus on concrete findings only. Be concise and specific.

            Pull request number:
            ${{ env.PR_NUMBER }}

            Event:
            ${{ github.event_name }}

  post-feedback:
    runs-on: ubuntu-latest
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request
                ? context.payload.pull_request.number
                : context.payload.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

name: Codex Security Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.inputs.pr_number }}/merge

      - name: Pre-fetch PR refs
        run: |
          git fetch --no-tags origin +refs/pull/${{ github.event.inputs.pr_number }}/head

      - name: Run Codex security review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          prompt: |
            Review pull request #${{ github.event.inputs.pr_number }} for security issues only.

            Review this pull request for security issues only.

            Look for:
            - injection vulnerabilities
            - authentication or authorization flaws
            - secret exposure
            - unsafe file or path handling
            - SSRF, request smuggling, open redirects, or similar request-handling flaws
            - race conditions with security impact

            Return an empty response if you do not find a concrete security issue.

  post-feedback:
    runs-on: ubuntu-latest
    needs: security-review
    if: needs.security-review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex security feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.security-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(context.payload.inputs.pr_number),
              body: process.env.CODEX_FINAL_MESSAGE,
            });

name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["type/feature", "status/triage"]
assignees: ["hairglasses"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it! For open-ended brainstorming, consider using [GitHub Discussions](../../discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature are you proposing? Give a concise overview.
      placeholder: "Add support for X so that Y becomes possible."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this feature solve? Why is the current behavior insufficient?
      placeholder: "I frequently need to X, but currently I have to Y which is cumbersome because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include API examples, CLI usage, or pseudocode.
      placeholder: |
        ```go
        // Example of the desired behavior
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why are they less suitable?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of tmux-mcp does this affect?
      options:
        - session management (new, kill, list)
        - window management (new, list)
        - pane management (list, capture)
        - send-keys / input
        - declarative workspace
        - error handling
        - documentation
        - CI/CD / tooling
        - other
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Breaking Change
      description: Would this require changes to existing user workflows?
      options:
        - label: This feature would introduce a breaking change to the tool interface
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, screenshots, related issues, or prior art?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for duplicates
          required: true
        - label: I am willing to submit a PR for this feature
          required: false

name: MCP Tool Request
description: Propose a new MCP tool for tmux-mcp
title: "[Tool] "
labels: ["type/mcp-tool", "status/triage"]
assignees: ["hairglasses"]
body:
  - type: markdown
    attributes:
      value: |
        Propose a new MCP tool! Describe what it should do, who benefits, and how agents would use it.

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: "Follow the `tmux_action` naming convention (e.g., `tmux_split_pane`, `tmux_resize`)"
      placeholder: "tmux_split_pane"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this tool do? One clear sentence.
      placeholder: "Splits the current pane horizontally or vertically."
    validations:
      required: true

  - type: textarea
    id: parameters
    attributes:
      label: Input Parameters
      description: What input parameters should the tool accept? Use a table format.
      placeholder: |
        | Parameter | Type | Required | Description |
        |-----------|------|----------|-------------|
        | session | string | yes | Target session name |
        | direction | string | no | Split direction: "horizontal" or "vertical" |
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Expected Output
      description: What should the tool return? Provide an example.
      placeholder: |
        ```json
        {
          "session": "dev",
          "pane_id": "%3",
          "direction": "horizontal"
        }
        ```
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security Considerations
      description: Does this tool read sensitive data, modify system state, or require elevated privileges?
      placeholder: "Modifies tmux session state. No elevated privileges required."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the existing tool catalog and this is not a duplicate
          required: true
        - label: I am willing to implement this tool
          required: false
